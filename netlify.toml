[build]
  command = "echo 'Build complete'"
  publish = "."

[[redirects]]
  from = "/api/doh/*"
  to = ":splat"
  status = 200
  force = true
  headers = {
    "Access-Control-Allow-Origin" = "*",
    "Access-Control-Allow-Methods" = "GET, POST, OPTIONS",
    "Access-Control-Allow-Headers" = "Accept, Content-Type"
  }

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"